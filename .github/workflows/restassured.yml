name: Run RestAssured Tests and Publish Allure
permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [master]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    container: maven:3.9-eclipse-temurin-21

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run RestAssured Tests
        run: mvn clean test

      - name: Generate Allure Report
        run: mvn allure:report

      # Prepare both timestamped and latest folders locally
      - name: Prepare Allure Report for Deployment
        run: |
          TIMESTAMP=${{ github.run_number }}-${{ github.run_id }}
          mkdir -p deploy/$TIMESTAMP deploy/latest
          cp -r target/site/allure-maven-plugin/* deploy/$TIMESTAMP/
          cp -r target/site/allure-maven-plugin/* deploy/latest/

      # Single deployment to gh-pages branch
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          commit_message: "Update Allure report [run #${{ github.run_number }}] [skip ci]"