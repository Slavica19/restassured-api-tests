name: Run RestAssured Tests and Publish Allure
permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [master]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    container: maven:3.9-eclipse-temurin-21  # Run job inside Docker

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 3️⃣ Run RestAssured tests
      - name: Run RestAssured Tests
        run: mvn clean test

      # 4️⃣ Generate Allure Report
      - name: Generate Allure Report
        run: mvn allure:report

      # 5️⃣ Deploy Allure Report to GitHub Pages (timestamped + latest)
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin
          publish_branch: gh-pages
          # Deploy to both timestamped folder and "latest"
          destination_dir: |
            ${{ github.run_number }}-${{ github.run_id }}
            latest
          commit_message: "Update Allure report [run #${{ github.run_number }}] [skip ci]"