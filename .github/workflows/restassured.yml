name: Run RestAssured Tests and Publish Allure
permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [master]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    container: maven:3.9-eclipse-temurin-21

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run RestAssured Tests
        run: mvn clean test

      - name: Generate Allure Report
        run: mvn allure:report

      # ✅ FIXED: include previous reports from gh-pages
      - name: Prepare Allure Report for Deployment
        run: |
          TIMESTAMP=${{ github.run_number }}-${{ github.run_id }}

          # Clone existing gh-pages branch (if exists)
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages || mkdir gh-pages

          # Create deploy folder and copy existing reports
          mkdir -p deploy
          cp -r gh-pages/* deploy/ 2>/dev/null || true

          # Create new report folders
          mkdir -p deploy/$TIMESTAMP deploy/latest

          # Copy new report into timestamped folder
          cp -r target/site/allure-maven-plugin/* deploy/$TIMESTAMP/

          # Replace latest report
          rm -rf deploy/latest/*
          cp -r target/site/allure-maven-plugin/* deploy/latest/

      # ✅ FIXED: dashboard now includes ALL reports + sorted newest first
      - name: Create dashboard index.html
        run: |
          echo "<!DOCTYPE html>
          <html>
          <head>
            <title>Allure Reports Dashboard</title>
            <style>
              body { font-family: Arial; padding: 20px; }
              h1 { color: #333; }
              ul { list-style: none; padding: 0; }
              li { margin: 8px 0; }
              a { text-decoration: none; color: #0366d6; }
              a:hover { text-decoration: underline; }
              .latest { font-weight: bold; font-size: 18px; }
            </style>
          </head>
          <body>
            <h1>Allure Reports Dashboard</h1>
            <p><a class='latest' href='./latest/'>➡ View Latest Report</a></p>
            <h2>History</h2>
            <ul>" > deploy/index.html

          for dir in $(ls -dt deploy/*/); do
            name=$(basename "$dir")
            if [ "$name" != "latest" ]; then
              echo "<li><a href='./$name/'>Report $name</a></li>" >> deploy/index.html
            fi
          done

          echo "</ul>
          </body>
          </html>" >> deploy/index.html

      # Deploy everything (dashboard + all reports)
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          commit_message: "Update Allure report [run #${{ github.run_number }}] [skip ci]"