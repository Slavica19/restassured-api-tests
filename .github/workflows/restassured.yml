name: Run RestAssured Tests and Publish Allure
permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [master]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    container: maven:3.9-eclipse-temurin-21

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run RestAssured Tests
        run: mvn clean test

      - name: Generate Allure Report
        run: mvn allure:report

      # Step 1: Deploy to timestamped folder
      - name: Deploy Allure Report - Timestamped
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin/
          publish_branch: gh-pages
          destination_dir: ${{ github.run_number }}-${{ github.run_id }}
          commit_message: "Update Allure report [run #${{ github.run_number }}] [skip ci]"

      # Step 2: Deploy to latest folder
      - name: Deploy Allure Report - Latest
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin/
          publish_branch: gh-pages
          destination_dir: latest
          commit_message: "Update latest Allure report [run #${{ github.run_number }}] [skip ci]"