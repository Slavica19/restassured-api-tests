name: Run RestAssured Tests and Publish Allure
permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [master]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    container: maven:3.9-eclipse-temurin-21

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run RestAssured Tests
        run: mvn clean test

      - name: Generate Allure Report
        run: mvn allure:report

      # Prepare both timestamped and latest folders locally
      - name: Prepare Allure Report for Deployment
        run: |
          TIMESTAMP=${{ github.run_number }}-${{ github.run_id }}
          mkdir -p deploy/$TIMESTAMP deploy/latest
          cp -r target/site/allure-maven-plugin/* deploy/$TIMESTAMP/
          cp -r target/site/allure-maven-plugin/* deploy/latest/

      # Create dashboard

  - name: Create dashboard index.html
    run: |
      echo "<!DOCTYPE html>
      <html>
      <head>
        <title>Allure Reports Dashboard</title>
        <style>
          body { font-family: Arial; padding: 20px; }
          h1 { color: #333; }
          ul { list-style: none; padding: 0; }
          li { margin: 8px 0; }
          a { text-decoration: none; color: #0366d6; }
          a:hover { text-decoration: underline; }
          .latest { font-weight: bold; font-size: 18px; }
        </style>
      </head>
      <body>
        <h1>Allure Reports Dashboard</h1>
        <p><a class='latest' href='./latest/'>➡ View Latest Report</a></p>
        <h2>History</h2>
        <ul>" > deploy/index.html
      
      # List folders sorted (newest first)
      for dir in $(ls -dt deploy/*/); do
        name=$(basename "$dir")
        if [ "$name" != "latest" ]; then
          echo "<li><a href='./$name/'>Report $name</a></li>" >> deploy/index.html
        fi
      done
      
      echo "</ul>
      </body>
      </html>" >> deploy/index.html

      # Deploy everything (dashboard + reports)
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          commit_message: "Update Allure report [run #${{ github.run_number }}] [skip ci]"